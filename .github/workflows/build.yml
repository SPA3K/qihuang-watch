name: Build iOS+Watch

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-check:
    name: 🏗️ 编译
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 安装 xcodegen
        run: brew install xcodegen

      - name: 生成 Xcode 项目
        run: |
          xcodegen generate
          echo "✅ xcodegen 完成"
          ls -la *.xcodeproj

      - name: 编译 iPhone
        run: |
          xcodebuild build \
            -project QiHuangPulse.xcodeproj \
            -scheme QiHuangPulse \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tail -30

      - name: 编译 Watch
        run: |
          xcodebuild build \
            -project QiHuangPulse.xcodeproj \
            -scheme QiHuangWatch \
            -destination 'generic/platform=watchOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tail -30
