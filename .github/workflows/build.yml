name: Build iOS+Watch

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 生成 Xcode 项目
        run: python3 scripts/generate_project.py

      - name: 编译 iPhone
        run: |
          xcodebuild build \
            -project QiHuangPulse.xcodeproj \
            -scheme QiHuangPulse \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50

      - name: 编译 Watch
        run: |
          xcodebuild build \
            -project QiHuangPulse.xcodeproj \
            -scheme QiHuangWatch \
            -destination "generic/platform=watchOS Simulator" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50
