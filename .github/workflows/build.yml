name: Build Check

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ 编译检查
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 安装 xcodegen
        run: brew install xcodegen

      - name: 生成 Xcode 项目
        run: xcodegen generate

      - name: 列出生成的项目
        run: ls -la *.xcodeproj 2>/dev/null && echo "✅ 项目生成成功"

      - name: 编译 iPhone App
        run: |
          set -o pipefail
          xcodebuild build \
            -project QiHuangPulse.xcodeproj \
            -scheme QiHuangPulse \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50

      - name: 编译 Watch App
        run: |
          set -o pipefail
          xcodebuild build \
            -project QiHuangPulse.xcodeproj \
            -scheme QiHuangWatch \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 10 (46mm),OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50

      - name: ✅ 编译成功
        if: success()
        run: echo "🎉 两个 Target 都编译通过了！"
