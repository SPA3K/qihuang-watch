name: QiHuangWatch
options:
  bundleIdPrefix: com.qihuang.pulse
  deploymentTarget:
    watchOS: "10.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "4"  # Apple Watch only

targets:
  QiHuangWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - Sources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: "岐黄脉镜"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.qihuang.pulse.iphone
        HealthShareUsageDescription: "岐黄脉镜需要读取您的健康数据进行中医脉象分析"
        NSHealthUpdateUsageDescription: "岐黄脉镜需要访问健康数据以提供健康评估"
    entitlements:
      path: Resources/QiHuangWatch.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.qihuang.pulse.watchkitapp
      INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.qihuang.pulse.iphone
